<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
</head>
<body class="bg-surface text-text font-serif antialiased">
  {% include header.html %}
  <main>
    {{ content }}
  </main>
  {% include footer.html %}

  <!-- Mouseover video toggle script -->
  <script>
    document.querySelectorAll('.publication-mousecell').forEach(function(el) {
      var video = el.querySelector('video');
      var img = el.querySelector('img');
      if (video && img) {
        el.addEventListener('mouseenter', function() {
          video.classList.remove('hidden');
          img.classList.add('hidden');
        });
        el.addEventListener('mouseleave', function() {
          video.classList.add('hidden');
          img.classList.remove('hidden');
        });
      }
    });
  </script>

  <!-- Lightbox: click any post image to zoom -->
  <style>
    .lightbox-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center;
      cursor: zoom-out;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .lightbox-overlay.active {
      opacity: 1; pointer-events: auto;
    }
    .lightbox-overlay img {
      max-width: 92vw; max-height: 92vh;
      border-radius: 4px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      cursor: default;
    }
    .lightbox-overlay .close-hint {
      position: absolute; top: 16px; right: 20px;
      color: #fff; font-size: 28px; line-height: 1;
      opacity: 0.6; cursor: pointer;
    }
    .lightbox-overlay .close-hint:hover { opacity: 1; }
  </style>
  <div class="lightbox-overlay" id="lightbox">
    <span class="close-hint">&times;</span>
    <img src="" alt="zoomed" />
  </div>
  <script>
    (function() {
      var lb = document.getElementById('lightbox');
      var lbImg = lb.querySelector('img');
      var close = lb.querySelector('.close-hint');

      function open(src) { lbImg.src = src; lb.classList.add('active'); }
      function closeLB() { lb.classList.remove('active'); }

      close.addEventListener('click', closeLB);
      lb.addEventListener('click', closeLB);
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeLB();
      });

      // Attach to all <img> inside <main> (except those already wrapped in links)
      document.querySelectorAll('main img').forEach(function(img) {
        // Skip if the image is inside an <a> tag (already has click behavior)
        if (img.closest('a')) return;
        img.style.cursor = 'zoom-in';
        img.addEventListener('click', function(e) {
          e.stopPropagation();
          open(img.src);
        });
      });
    })();
  </script>
</body>
</html>
