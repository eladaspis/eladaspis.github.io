---
layout: default
---
<article class="py-8 md:py-12 bg-surface">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="lg:grid lg:grid-cols-12 lg:gap-8 xl:gap-12">
      <!-- Main Content Column -->
      <main class="lg:col-span-8 xl:col-span-8">
        <header class="mb-8">
          <h1 class="font-display text-3xl md:text-4xl font-semibold text-text">
            {{ page.title }}
          </h1>
          <p class="text-text-muted mt-2 text-sm">
            {{ page.date | date: "%B %d, %Y" }}
            {% if page.tags.size > 0 %}
            <span class="mx-2">·</span>
            {% for tag in page.tags %}
              <span class="inline-block bg-surface-muted text-text-body text-xs px-2 py-0.5 rounded mr-1">{{ tag }}</span>
            {% endfor %}
            {% endif %}
          </p>
        </header>

        <div class="prose prose-lg max-w-none id-content">
          {{ content }}
        </div>

        <footer class="mt-12 pt-8 border-t border-border">
          <a href="{{ '/blog.html' | relative_url }}" class="inline-flex items-center text-link hover:text-link-hover transition-colors no-underline">
            ← Back to blog
          </a>
        </footer>
      </main>

      <!-- Sticky Table of Contents Sidebar (Top Right) -->
      <aside class="hidden lg:block lg:col-span-4 xl:col-span-4">
        <div class="sticky top-24 max-h-[calc(100vh-7rem)] overflow-y-auto p-5 rounded-xl border border-border-subtle bg-surface-alt/80 backdrop-blur shadow-sm">
          <h3 class="font-display text-lg font-semibold text-text mb-3 flex items-center gap-2">
            <svg class="w-4 h-4 text-text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"></path>
            </svg>
            Table of Contents
          </h3>
          <nav id="sticky-toc" class="text-sm text-text-muted space-y-1">
            <!-- Dynamically populated via JS -->
          </nav>
        </div>
      </aside>
    </div>
  </div>
</article>

<!-- Floating Mobile/Universal Sticky Navigation Button & Menu -->
<div class="lg:hidden fixed top-20 right-4 z-40">
  <button id="toc-toggle-btn" class="bg-surface/90 backdrop-blur border border-border text-text px-3 py-2 rounded-full shadow-md text-xs font-sans font-medium flex items-center gap-1.5 hover:bg-surface-alt transition-colors">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"></path>
    </svg>
    <span>Contents</span>
  </button>

  <!-- Mobile Drawer -->
  <div id="toc-mobile-menu" class="hidden absolute right-0 mt-2 w-72 max-h-[75vh] overflow-y-auto bg-surface border border-border rounded-xl shadow-xl p-4 z-50 text-sm">
    <div class="flex items-center justify-between pb-2 mb-2 border-b border-border-subtle">
      <span class="font-semibold text-text font-display">Navigation</span>
      <button id="toc-close-btn" class="text-text-muted hover:text-text">&times;</button>
    </div>
    <nav id="sticky-toc-mobile" class="space-y-1 text-text-muted">
      <!-- Dynamically populated via JS -->
    </nav>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const headings = document.querySelectorAll('.id-content h2, .id-content h3');
    const desktopToc = document.getElementById('sticky-toc');
    const mobileToc = document.getElementById('sticky-toc-mobile');
    
    if (!headings.length || !desktopToc) return;

    let desktopHtml = '';
    let mobileHtml = '';

    headings.forEach((heading, idx) => {
      // Skip the inline Table of Contents heading itself if present
      if (heading.textContent.trim().toLowerCase().includes('table of contents')) return;

      if (!heading.id) {
        heading.id = 'heading-' + idx;
      }
      
      const isH3 = heading.tagName.toLowerCase() === 'h3';
      const indentClass = isH3 ? 'pl-4 text-xs' : 'font-medium';
      
      const link = `<a href="#${heading.id}" class="toc-link block py-1 px-2 rounded hover:bg-surface-muted hover:text-text transition-colors ${indentClass}" data-target="${heading.id}">${heading.textContent.replace(/^#+\s*/, '')}</a>`;
      
      desktopHtml += link;
      mobileHtml += link;
    });

    desktopToc.innerHTML = desktopHtml;
    if (mobileToc) mobileToc.innerHTML = mobileHtml;

    // Toggle Mobile Menu
    const toggleBtn = document.getElementById('toc-toggle-btn');
    const closeBtn = document.getElementById('toc-close-btn');
    const mobileMenu = document.getElementById('toc-mobile-menu');

    if (toggleBtn && mobileMenu) {
      toggleBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        mobileMenu.classList.toggle('hidden');
      });
      if (closeBtn) {
        closeBtn.addEventListener('click', () => mobileMenu.classList.add('hidden'));
      }
      document.addEventListener('click', (e) => {
        if (!mobileMenu.contains(e.target) && !toggleBtn.contains(e.target)) {
          mobileMenu.classList.add('hidden');
        }
      });
    }

    // ScrollSpy Active Heading Highlighting
    const tocLinks = document.querySelectorAll('.toc-link');
    
    function onScroll() {
      let currentId = '';
      headings.forEach(heading => {
        const top = heading.getBoundingClientRect().top;
        if (top <= 140) {
          currentId = heading.id;
        }
      });

      tocLinks.forEach(link => {
        if (link.getAttribute('data-target') === currentId) {
          link.classList.add('text-text', 'bg-surface-muted', 'font-semibold');
          link.classList.remove('text-text-muted');
        } else {
          link.classList.remove('text-text', 'bg-surface-muted', 'font-semibold');
          link.classList.add('text-text-muted');
        }
      });
    }

    window.addEventListener('scroll', onScroll);
    onScroll();
  });
</script>
