---
layout: default
---
<article class="py-6 md:py-10 bg-surface">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex flex-col lg:flex-row gap-8 items-start relative">
      <!-- Main Content Column -->
      <div class="w-full lg:w-3/4 min-w-0">
        <header class="mb-8">
          <h1 class="font-display text-3xl md:text-4xl font-semibold text-text">
            {{ page.title }}
          </h1>
          <p class="text-text-muted mt-2 text-sm">
            {{ page.date | date: "%B %d, %Y" }}
            {% if page.tags.size > 0 %}
            <span class="mx-2">·</span>
            {% for tag in page.tags %}
              <span class="inline-block bg-surface-muted text-text-body text-xs px-2 py-0.5 rounded mr-1">{{ tag }}</span>
            {% endfor %}
            {% endif %}
          </p>
        </header>

        <div class="prose prose-lg max-w-none id-content">
          {{ content }}
        </div>

        <footer class="mt-12 pt-8 border-t border-border">
          <a href="{{ '/blog.html' | relative_url }}" class="inline-flex items-center text-link hover:text-link-hover transition-colors no-underline">
            ← Back to blog
          </a>
        </footer>
      </div>

      <!-- Right Sidebar Table of Contents -->
      <aside class="hidden lg:block w-full lg:w-1/4 sticky top-6 self-start">
        <div class="p-4 rounded-xl border border-border bg-surface-muted/80 backdrop-blur shadow-sm max-h-[calc(100vh-3rem)] overflow-y-auto">
          <h3 class="text-xs font-sans font-bold uppercase tracking-wider text-text mb-3 flex items-center gap-1.5 border-b border-border-subtle pb-2">
            <svg class="w-3.5 h-3.5 text-text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"></path>
            </svg>
            Table of Contents
          </h3>
          <nav id="sticky-toc" class="text-xs space-y-1">
            <!-- Dynamically populated via JS -->
          </nav>
        </div>
      </aside>
    </div>
  </div>
</article>

<!-- Floating Mobile Sticky Navigation Button & Menu -->
<div class="lg:hidden fixed top-16 right-4 z-40">
  <button id="toc-toggle-btn" class="bg-surface/95 backdrop-blur border border-border text-text px-3 py-1.5 rounded-full shadow-md text-xs font-sans font-medium flex items-center gap-1.5 hover:bg-surface-alt transition-colors">
    <svg class="w-3.5 h-3.5 text-text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"></path>
    </svg>
    <span>Contents</span>
  </button>

  <!-- Mobile Drawer -->
  <div id="toc-mobile-menu" class="hidden absolute right-0 mt-2 w-64 max-h-[70vh] overflow-y-auto bg-surface border border-border rounded-xl shadow-xl p-3 z-50 text-xs">
    <div class="flex items-center justify-between pb-2 mb-2 border-b border-border-subtle">
      <span class="font-bold text-text text-xs uppercase tracking-wider">Navigation</span>
      <button id="toc-close-btn" class="text-text-muted hover:text-text text-base leading-none">&times;</button>
    </div>
    <nav id="sticky-toc-mobile" class="space-y-1 text-text-muted">
      <!-- Dynamically populated via JS -->
    </nav>
  </div>
</div>

<script>
  (function initTOC() {
    function buildTOC() {
      const headings = document.querySelectorAll('.id-content h2, .id-content h3, .id-content h4');
      const desktopToc = document.getElementById('sticky-toc');
      const mobileToc = document.getElementById('sticky-toc-mobile');
      
      if (!headings.length || !desktopToc) return;

      let desktopHtml = '';
      let mobileHtml = '';

      headings.forEach((heading, idx) => {
        const text = heading.textContent.trim();
        if (text.toLowerCase().includes('table of contents')) return;

        if (!heading.id) {
          heading.id = 'heading-' + idx;
        }
        
        const tag = heading.tagName.toLowerCase();
        let indentClass = 'font-semibold text-text-body';
        if (tag === 'h3') {
          indentClass = 'pl-2.5 text-text-muted font-normal';
        } else if (tag === 'h4') {
          indentClass = 'pl-5 text-text-subtle text-[11px] font-normal';
        }
        
        const cleanTitle = text.replace(/^#+\s*/, '');
        const link = `<a href="#${heading.id}" class="toc-link block py-1 px-1.5 rounded hover:bg-surface-alt hover:text-text transition-colors ${indentClass}" data-target="${heading.id}">${cleanTitle}</a>`;
        
        desktopHtml += link;
        mobileHtml += link;
      });

      desktopToc.innerHTML = desktopHtml;
      if (mobileToc) mobileToc.innerHTML = mobileHtml;

      // Toggle Mobile Menu
      const toggleBtn = document.getElementById('toc-toggle-btn');
      const closeBtn = document.getElementById('toc-close-btn');
      const mobileMenu = document.getElementById('toc-mobile-menu');

      if (toggleBtn && mobileMenu) {
        toggleBtn.onclick = function(e) {
          e.stopPropagation();
          mobileMenu.classList.toggle('hidden');
        };
        if (closeBtn) {
          closeBtn.onclick = function() { mobileMenu.classList.add('hidden'); };
        }
        document.addEventListener('click', function(e) {
          if (!mobileMenu.contains(e.target) && !toggleBtn.contains(e.target)) {
            mobileMenu.classList.add('hidden');
          }
        });
      }

      // ScrollSpy Active Heading Highlighting
      const tocLinks = document.querySelectorAll('.toc-link');
      
      function onScroll() {
        let currentId = '';
        headings.forEach(heading => {
          const top = heading.getBoundingClientRect().top;
          if (top <= 140) {
            currentId = heading.id;
          }
        });

        tocLinks.forEach(link => {
          if (link.getAttribute('data-target') === currentId) {
            link.classList.add('text-text', 'bg-surface-alt', 'font-bold');
            link.classList.remove('text-text-muted', 'text-text-subtle');
          } else {
            link.classList.remove('text-text', 'bg-surface-alt', 'font-bold');
          }
        });
      }

      window.addEventListener('scroll', onScroll);
      onScroll();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', buildTOC);
    } else {
      buildTOC();
    }
  })();
</script>
